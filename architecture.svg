<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333333"/>
    </marker>
  </defs>

  <!-- Route53 -->
  <rect x="20" y="120" width="120" height="46" rx="6" fill="#E8E8E8" stroke="#333333" stroke-width="2"/>
  <text x="80" y="148" font-size="14" fill="#222222" text-anchor="middle">Route53</text>

  <line x1="140" y1="143" x2="180" y2="143" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ALB -->
  <rect x="182" y="120" width="120" height="46" rx="6" fill="#F0F0F0" stroke="#333333" stroke-width="2"/>
  <text x="242" y="148" font-size="14" fill="#222222" text-anchor="middle">ALB</text>

  <line x1="302" y1="143" x2="342" y2="143" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ECS Service -->
  <rect x="344" y="112" width="150" height="62" rx="6" fill="#F7F7F7" stroke="#333333" stroke-width="2"/>
  <text x="419" y="138" font-size="13" fill="#222222" text-anchor="middle">ECS Service</text>
  <text x="419" y="158" font-size="12" fill="#555555" text-anchor="middle">(Fargate)</text>

  <line x1="494" y1="143" x2="534" y2="143" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Task -->
  <rect x="536" y="120" width="90" height="46" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="581" y="148" font-size="13" fill="#333333" text-anchor="middle">Task</text>

  <!-- ECR above, image pulled down into ECS -->
  <rect x="329" y="20" width="180" height="46" rx="6" fill="#E8E8E8" stroke="#333333" stroke-width="2"/>
  <text x="419" y="48" font-size="14" fill="#222222" text-anchor="middle">Amazon ECR</text>
  <line x1="419" y1="66" x2="419" y2="106" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="419" y="90" font-size="11" fill="#777777" text-anchor="middle">image pull</text>
</svg>
